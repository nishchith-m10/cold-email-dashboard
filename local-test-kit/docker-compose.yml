# local-test-kit/docker-compose.yml
#
# Spins up n8n + Postgres for local testing of the Genesis ignition flow.
#
# Usage:
#   cd local-test-kit
#   cp .env.example .env           # fill in real values
#   docker compose up -d
#
# Then in the dashboard .env.local, set:
#   LOCAL_MODE=true
#   N8N_BASE_URL=http://localhost:5678
#   N8N_API_URL=http://localhost:5678/api/v1
#   N8N_API_KEY=<generated below>
#   SIDECAR_AUTH_TOKEN=localdev-sidecar-token
#   SIDECAR_HANDSHAKE_SECRET=localdev-handshake-secret
#
# After containers start:
#   1. Open http://localhost:5678 → create owner account
#   2. Go to Settings → API → Create API key → paste into N8N_API_KEY
#   3. Run onboarding flow from the dashboard
#   4. Watch sidecar logs: docker compose logs -f genesis-sidecar

version: "3.9"

# ──────────────────────────────────────────────
# Named volume so n8n retains workflows between restarts
# ──────────────────────────────────────────────
volumes:
  n8n_data:
  postgres_data:

# ──────────────────────────────────────────────
# Shared network so services can reach each other by name
# ──────────────────────────────────────────────
networks:
  genesis-local:
    driver: bridge

services:
  # ─── Postgres (n8n backend DB) ───────────────
  postgres:
    image: postgres:16-alpine
    container_name: genesis-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8npassword
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5433 to avoid clashing with any local Postgres
    networks:
      - genesis-local
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── n8n ─────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: genesis-local-n8n
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8npassword

      # Instance config
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      N8N_EDITOR_BASE_URL: http://localhost:5678/

      # Security — set a real encryption key for local testing
      N8N_ENCRYPTION_KEY: local-test-encryption-key-change-me-32c

      # API access — enable the REST API
      N8N_PUBLIC_API_DISABLED: "false"

      # Timezone
      GENERIC_TIMEZONE: America/Los_Angeles

      # Disable telemetry for local dev
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_VERSION_NOTIFICATIONS_ENABLED: "false"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: 168   # 1 week in hours

    volumes:
      - n8n_data:/home/node/.n8n
    ports:
      - "5678:5678"
    networks:
      - genesis-local
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  # ─── Genesis Sidecar ─────────────────────────
  # Uncomment once you've built/pushed the sidecar image.
  # Build locally: cd ../sidecar && docker build -t genesis-sidecar:local .
  #
  # genesis-sidecar:
  #   image: genesis-sidecar:local
  #   container_name: genesis-local-sidecar
  #   restart: unless-stopped
  #   depends_on:
  #     n8n:
  #       condition: service_healthy
  #   environment:
  #     PORT: 3001
  #     N8N_BASE_URL: http://n8n:5678
  #     N8N_API_URL: http://n8n:5678/api/v1
  #     N8N_API_KEY: ${N8N_API_KEY:-changeme}
  #     SIDECAR_AUTH_TOKEN: ${SIDECAR_AUTH_TOKEN:-localdev-sidecar-token}
  #     SIDECAR_HANDSHAKE_SECRET: ${SIDECAR_HANDSHAKE_SECRET:-localdev-handshake-secret}
  #     DASHBOARD_CALLBACK_URL: ${DASHBOARD_CALLBACK_URL:-http://host.docker.internal:3000}
  #   ports:
  #     - "3001:3001"
  #   networks:
  #     - genesis-local
